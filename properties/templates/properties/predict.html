<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Dự Đoán Giá Nhà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow p-4 border-0">
            <h3 class="text-center fw-bold text-warning bg-dark py-2 rounded mb-4">🤖 BOT AI DỰ ĐOÁN GIÁ</h3>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Diện tích (m²)</label>
                    <input type="number" name="dien_tich" class="form-control" placeholder="Ví dụ: 80" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Số phòng ngủ</label>
                    <input type="number" name="so_phong" class="form-control" placeholder="Ví dụ: 3" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold py-2 text-dark">Bắt đầu dự đoán</button>
            </form>

            {% if ket_qua %}
                <div class="alert alert-success mt-4 text-center fw-bold fs-5">
                    💰 Giá dự đoán từ mô hình: <br><span class="text-danger fs-3">{{ ket_qua }}</span> Triệu VND
                </div>
            {% endif %}
            
            <a href="/" class="text-center d-block mt-3 text-decoration-none text-secondary">← Quay lại trang chủ danh sách</a>
        </div>
    </div>
</body>
</html>
